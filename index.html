* { box-sizing: border-box; }
html, body { margin:0; padding:0; }
.as-root {
  --paper:#F4F6F3; --card:#FFFFFF; --ink:#20302A; --muted:#6B7A72;
  --line:#E4E8E2; --primary:#2E6F5E; --primary-soft:#E7F1ED;
  --font-body:'Nunito', system-ui, sans-serif; --font-disp:'Fredoka', system-ui, sans-serif;
  font-family:var(--font-body);
  color:var(--ink); background:var(--paper);
  min-height:100vh; -webkit-font-smoothing:antialiased;
}
.as-root.lang-en { --font-body:'Nunito', system-ui, sans-serif; --font-disp:'Fredoka', system-ui, sans-serif; }
.as-root.lang-ko { --font-body:'Gothic A1', system-ui, sans-serif; --font-disp:'Jua', system-ui, sans-serif; }
.as-root.lang-ja { --font-body:'Kosugi Maru', system-ui, sans-serif; --font-disp:'Kosugi Maru', system-ui, sans-serif; }
.as-root.lang-zh { --font-body:'Noto Sans SC', system-ui, sans-serif; --font-disp:'ZCOOL KuaiLe', system-ui, sans-serif; }
.as-wrap { max-width:760px; margin:0 auto; padding:max(20px, env(safe-area-inset-top)) 16px 120px; }
.as-disp { font-family:var(--font-disp); font-weight:400; }
.as-head { margin:6px 2px 18px; }
.as-eyebrow { color:var(--muted); font-size:13px; font-weight:600; letter-spacing:.02em; }
.as-today { font-size:clamp(23px, 6.4vw, 31px); line-height:1.14; margin-top:2px; display:flex; align-items:baseline; gap:9px; flex-wrap:wrap; }
.as-today .dow { color:var(--primary); }
.as-card { background:var(--card); border:1px solid var(--line); border-radius:18px; padding:16px 16px 14px; margin-bottom:14px; }
.as-kidrow { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
.as-dot { width:14px; height:14px; border-radius:50%; flex:none; }
.as-kidname { font-family:var(--font-disp); font-size:19px; }
.as-spacer { flex:1; }
.as-avatar-wrap { position:relative; flex:none; }
.as-avatar { width:64px; height:64px; border-radius:50%; border:2px solid var(--line); background:var(--primary-soft); cursor:pointer; overflow:hidden; display:flex; align-items:center; justify-content:center; padding:0; }
.as-avatar:hover { border-color:var(--primary); }
.as-avatar img { width:100%; height:100%; object-fit:cover; }
.as-avatar .ph { color:var(--primary); display:flex; }
.as-avatar-rm { position:absolute; top:-5px; right:-5px; width:19px; height:19px; border-radius:50%; background:#20302A; color:#fff; display:flex; align-items:center; justify-content:center; border:2px solid #fff; cursor:pointer; padding:0; }
.as-ring-wrap { display:flex; align-items:center; gap:6px; color:var(--muted); font-size:12.5px; font-weight:600; }
.as-ring { transform:rotate(-90deg); }
.as-ring .bg { stroke:var(--line); }
.as-ring .fg { stroke-linecap:round; transition:stroke-dashoffset .5s ease; }
@media (prefers-reduced-motion: reduce){ .as-ring .fg { transition:none; } }
.as-acts { display:flex; flex-wrap:wrap; gap:6px; margin:2px 0 12px; }
.as-act { display:inline-flex; align-items:center; gap:6px; padding:5px 11px; border-radius:999px; font-size:13px; font-weight:600; }
.as-act .t { font-variant-numeric:tabular-nums; opacity:.85; }
.as-empty { color:var(--muted); font-size:13px; padding:4px 2px 10px; }
.as-divider { height:1px; background:var(--line); margin:4px 0 12px; }
.as-sub { font-size:12px; font-weight:700; color:var(--muted); letter-spacing:.03em; margin-bottom:8px; }
.as-rowhd { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
.as-task { display:flex; align-items:center; gap:11px; padding:9px 4px; cursor:pointer; user-select:none; border-radius:10px; }
.as-task:hover { background:#fafbfa; }
.as-box { width:24px; height:24px; border-radius:8px; border:2px solid var(--line); display:flex; align-items:center; justify-content:center; flex:none; transition:all .15s ease; }
.as-task.on .as-box { border-color:var(--primary); background:var(--primary); }
.as-task.on .as-label { color:var(--muted); text-decoration:line-through; }
.as-label { font-size:15.5px; }
.as-oneoff-x { display:flex; color:var(--muted); cursor:pointer; padding:3px; border-radius:6px; }
.as-oneoff-x:hover { color:#c0392b; }
.as-celebrate { margin-top:6px; color:var(--primary); font-weight:700; font-size:14px; }
.as-tabbar { position:fixed; left:0; right:0; bottom:0; background:rgba(255,255,255,.92);
  backdrop-filter:blur(8px); border-top:1px solid var(--line); display:flex; justify-content:center; gap:6px;
  padding:8px 8px calc(8px + env(safe-area-inset-bottom)); z-index:20; }
.as-tab { flex:1; max-width:160px; display:flex; flex-direction:column; align-items:center; gap:3px;
  padding:8px 4px; border:none; background:none; color:var(--muted); font-family:inherit; font-size:11.5px; font-weight:700; cursor:pointer; border-radius:12px; }
.as-tab.active { color:var(--primary); background:var(--primary-soft); }
.as-seg { display:inline-flex; background:var(--paper); border:1px solid var(--line); border-radius:10px; padding:2px; gap:2px; flex:none; }
.as-seg-btn { font-family:inherit; font-size:12.5px; font-weight:700; color:var(--muted); background:none; border:none; border-radius:8px; padding:6px 12px; cursor:pointer; }
.as-seg-btn.on { background:#fff; color:var(--primary); box-shadow:0 1px 2px rgba(0,0,0,.06); }
.as-grid-scroll { overflow-x:auto; -webkit-overflow-scrolling:touch; margin:0 -16px; padding:0 16px; }
.as-grid { border-collapse:separate; border-spacing:0; width:100%; min-width:560px; }
.as-grid th, .as-grid td { border-bottom:1px solid var(--line); padding:8px 6px; vertical-align:top; }
.as-grid th { font-size:12.5px; color:var(--muted); font-weight:700; text-align:center; }
.as-grid th.namecol, .as-grid td.namecol { text-align:left; width:78px; position:sticky; left:0; background:var(--paper); }
.as-grid td.today-col, .as-grid th.today-col { background:var(--primary-soft); }
.as-cell { display:flex; flex-direction:column; gap:5px; min-height:34px; }
.as-daylist { display:flex; flex-direction:column; gap:10px; }
.as-daycard { border:1px solid var(--line); border-radius:14px; padding:10px 12px; }
.as-daycard.today { border-color:var(--primary); background:var(--primary-soft); }
.as-dayhd { font-family:var(--font-disp); font-size:15px; margin-bottom:6px; display:flex; align-items:center; gap:7px; }
.as-dayhd .dt { font-family:var(--font-body); font-size:12px; font-weight:700; color:var(--muted); }
.as-dayhd .tag { font-family:var(--font-body); font-size:11px; font-weight:700; color:#fff; background:var(--primary); border-radius:6px; padding:1px 7px; }
.as-daykid { display:flex; align-items:flex-start; gap:8px; padding:5px 0; }
.as-dayname { font-size:13.5px; font-weight:700; min-width:56px; padding-top:3px; }
.as-daychips { display:flex; flex-wrap:wrap; gap:5px; align-items:center; flex:1; }
.as-chip { display:inline-flex; align-items:center; gap:5px; padding:4px 8px; border-radius:9px; font-size:12px; font-weight:600; }
.as-addcell { border:1px dashed var(--line); background:none; border-radius:8px; color:var(--muted); cursor:pointer; padding:3px; display:flex; align-items:center; justify-content:center; }
.as-addcell:hover { color:var(--primary); border-color:var(--primary); }
.as-clsgrid { display:grid; grid-template-columns:1fr; gap:10px; margin-top:4px; }
@media (min-width:520px){ .as-clsgrid { grid-template-columns:1fr 1fr; } }
.as-clscard { border:1px solid var(--line); border-radius:14px; padding:12px 13px; cursor:pointer; transition:border-color .15s; }
.as-clscard:hover { border-color:var(--primary); }
.as-clshd { display:flex; align-items:center; gap:7px; margin-bottom:8px; }
.as-clsdots { display:inline-flex; gap:3px; flex:none; }
.as-clsname { font-family:var(--font-disp); font-size:15.5px; }
.as-clskid { font-size:11px; font-weight:700; color:var(--muted); background:var(--paper); border:1px solid var(--line); border-radius:6px; padding:1px 6px; }
.as-clsedit { color:var(--muted); display:flex; }
.as-clsrow { display:flex; align-items:flex-start; gap:7px; font-size:13px; padding:3px 0; }
.as-clsrow .ico { color:var(--muted); margin-top:1px; flex:none; }
.as-clsrow .lab { color:var(--muted); min-width:54px; flex:none; }
.as-clsrow .val { word-break:break-word; }
.as-maplink { color:var(--primary); font-weight:700; text-decoration:none; display:inline-flex; align-items:center; gap:3px; margin-left:6px; white-space:nowrap; }
.as-maplink:hover { text-decoration:underline; }
.as-clsmemo { margin-top:8px; padding-top:8px; border-top:1px dashed var(--line); font-size:12.5px; color:var(--muted); white-space:pre-wrap; line-height:1.55; }
.as-clsempty { color:var(--muted); font-size:13px; padding:8px 2px; line-height:1.5; }
.as-input { font-family:inherit; font-size:14.5px; padding:9px 11px; border:1px solid var(--line); border-radius:11px; background:#fff; color:var(--ink); width:100%; }
.as-input:focus { outline:2px solid var(--primary-soft); border-color:var(--primary); }
.as-btn { font-family:inherit; font-weight:700; font-size:14px; padding:9px 14px; border-radius:12px; border:none; cursor:pointer; display:inline-flex; align-items:center; gap:6px; }
.as-btn.primary { background:var(--primary); color:#fff; }
.as-btn.ghost { background:#fff; border:1px solid var(--line); color:var(--ink); }
.as-iconbtn { border:none; background:none; cursor:pointer; color:var(--muted); padding:6px; border-radius:8px; display:flex; }
.as-iconbtn.danger:hover { color:#c0392b; background:#fdecea; }
.as-iconbtn:hover { color:var(--primary); background:var(--primary-soft); }
.as-swatches { display:flex; gap:8px; flex-wrap:wrap; }
.as-sw { width:26px; height:26px; border-radius:50%; cursor:pointer; border:2px solid transparent; }
.as-sw.sel { border-color:var(--ink); }
.as-row { display:flex; gap:8px; align-items:center; }
.as-addbar { display:flex; gap:8px; margin-top:8px; }
.as-pills { display:flex; gap:5px; flex-wrap:wrap; align-items:center; margin:9px 0 2px; }
.as-pill { display:inline-flex; align-items:center; justify-content:center; min-width:28px; height:28px; padding:0 9px; border-radius:8px; border:1px solid var(--line); font-size:12px; font-weight:700; color:var(--muted); cursor:pointer; background:#fff; user-select:none; }
.as-pill.on { background:var(--primary); border-color:var(--primary); color:#fff; }
.as-preset { font-size:11.5px; font-weight:700; color:var(--primary); background:var(--primary-soft); border:none; border-radius:8px; padding:6px 9px; cursor:pointer; font-family:inherit; }
.as-langgrid { display:flex; flex-wrap:wrap; gap:7px; }
.as-langbtn { font-family:inherit; font-size:13px; font-weight:700; color:var(--muted); background:#fff; border:1px solid var(--line); border-radius:10px; padding:8px 14px; cursor:pointer; }
.as-langbtn.on { background:var(--primary); border-color:var(--primary); color:#fff; }
.as-arrowbtn { border:1px solid var(--line); background:#fff; border-radius:8px; width:26px; height:26px; cursor:pointer; color:var(--ink); display:inline-flex; align-items:center; justify-content:center; padding:0; }
.as-arrowbtn:hover { border-color:var(--primary); color:var(--primary); }
.as-detail-row { display:flex; align-items:center; gap:9px; font-size:14px; padding:6px 0; }
.as-detail-row .ico { color:var(--muted); flex:none; display:flex; }
.as-detail-row .v { font-weight:600; }
.cal-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.cal-month { font-family:var(--font-disp); font-size:17px; }
.cal-navbtn { border:1px solid var(--line); background:#fff; border-radius:9px; width:34px; height:34px; cursor:pointer; color:var(--ink); display:flex; align-items:center; justify-content:center; }
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
.cal-h { text-align:center; font-size:11px; font-weight:700; color:var(--muted); padding:2px 0 4px; }
.cal-c { aspect-ratio:1; display:flex; align-items:center; justify-content:center; border-radius:9px; font-size:13px; font-weight:700; cursor:pointer; color:var(--ink); border:1.5px solid transparent; }
.cal-c.empty { cursor:default; }
.cal-c.today { border-color:var(--primary); }
.cal-c.sel { outline:2px solid var(--primary); outline-offset:-1px; }
.cal-mini .cal-c { cursor:default; font-size:11.5px; border-radius:7px; }
button:focus-visible, [tabindex]:focus-visible { outline:2px solid var(--primary); outline-offset:2px; }
.as-pop { position:fixed; inset:0; background:rgba(20,30,25,.35); display:flex; align-items:center; justify-content:center; z-index:40; padding:18px; }
.as-popcard { background:#fff; border-radius:18px; padding:18px; width:100%; max-width:360px; max-height:88vh; overflow-y:auto; }
.as-poptitle { font-family:var(--font-disp); font-size:18px; margin-bottom:14px; }
</style>

  // ── 이벤트 ──
  root.addEventListener("click", function(e){
    var el=e.target.closest("[data-act]"); if(!el) return;
    var a=el.dataset.act;
    if(a==="maplink") return;
    else if(a==="tab"){ view=el.dataset.view; render(); }
    else if(a==="set-lang"){ data.lang=el.dataset.lang; save(); }
    else if(a==="set-theme"){ data.theme.color=el.dataset.color; save(); }
    else if(a==="photo"){ pickPhoto(el.dataset.kid); }
    else if(a==="photo-rm"){ removePhoto(el.dataset.kid); }
    else if(a==="week-layout"){ data.weekLayout=el.dataset.layout; save(); }
    else if(a==="week-prev"){ weekOffset--; render(); }
    else if(a==="week-next"){ weekOffset++; render(); }
    else if(a==="dl-image"){ downloadImage(); }
    else if(a==="share"){ shareSchedule(); }
    else if(a==="to-today"){ selectedDate=todayKey(); render(); }
    else if(a==="open-cal"){ var d=parseKey(selectedDate); cal={y:d.getFullYear(),m:d.getMonth()}; render(); }
    else if(a==="cal-prev"){ cal.m--; if(cal.m<0){cal.m=11;cal.y--;} render(); }
    else if(a==="cal-next"){ cal.m++; if(cal.m>11){cal.m=0;cal.y++;} render(); }
    else if(a==="cal-pick"){ selectedDate=el.dataset.key; cal=null; render(); }
    else if(a==="cal-today"){ selectedDate=todayKey(); cal=null; render(); }
    else if(a==="cal-close"){ cal=null; render(); }
    else if(a==="cal-overlay"){ if(e.target===el){ cal=null; render(); } }
    else if(a==="open-term"){ termEdit=true; render(); }
    else if(a==="term-set"){ data.term.term=+el.dataset.n; save(); }
    else if(a==="term-break"){ data.term.onBreak=el.dataset.v==="1"; save(); }
    else if(a==="term-close"){ termEdit=false; render(); }
    else if(a==="term-overlay"){ if(e.target===el){ termEdit=false; render(); } }
    else if(a==="kid-expand"){ kidExpanded[el.dataset.kid]=!kidExpanded[el.dataset.kid]; render(); }
    else if(a==="achv-expand"){ achvExpanded[el.dataset.kid]=!achvExpanded[el.dataset.kid]; render(); }
    else if(a==="toggle"){ toggleItem(el.dataset.kid, el.dataset.task); }
    else if(a==="open-add"){ openActAdd(el.dataset.kid,+el.dataset.dow); }
    else if(a==="act-open"){ openActView(el.dataset.kid,el.dataset.id); }
    else if(a==="act-day"){ actToggleDay(+el.dataset.d); }
    else if(a==="act-preset"){ actPreset(el.dataset.preset); }
    else if(a==="act-scope"){ actSetScope(el.dataset.scope); }
    else if(a==="act-save"){ saveAct(); }
    else if(a==="act-cancel"){ actEdit=null; render(); }
    else if(a==="act-overlay"){ if(e.target===el){ actEdit=null; render(); } }
    else if(a==="actv-edit"){ openActEdit(actView.kidId,actView.id); }
    else if(a==="actv-delete"){ removeActivity(actView.kidId,actView.id,actView.weekKey); actView=null; }
    else if(a==="actv-close"){ actView=null; render(); }
    else if(a==="actv-overlay"){ if(e.target===el){ actView=null; render(); } }
    else if(a==="add-kid"){ addKid(); }
    else if(a==="rm-kid"){ removeKid(el.dataset.kid); }
    else if(a==="color"){ updateKid(el.dataset.kid,{color:el.dataset.color}); }
    else if(a==="rm-routine"){ removeRoutine(el.dataset.kid,el.dataset.rid); }
    else if(a==="r-day"){ toggleRoutineDay(el.dataset.kid,el.dataset.rid,+el.dataset.d); }
    else if(a==="r-preset"){ presetRoutine(el.dataset.kid,el.dataset.rid,el.dataset.preset); }
    else if(a==="add-routine"){ var ri=document.querySelector('[data-routineinput][data-kid="'+el.dataset.kid+'"]'); addRoutine(el.dataset.kid, ri?ri.value:""); }
    else if(a==="add-oneoff"){ var oi=document.querySelector('[data-oneoffinput][data-kid="'+el.dataset.kid+'"]'); addOneoff(el.dataset.kid, oi?oi.value:""); }
    else if(a==="rm-oneoff"){ removeOneoff(el.dataset.kid,el.dataset.id); }
    else if(a==="cls-add"){ openClassAdd(); }
    else if(a==="cls-edit"){ openClassEdit(el.dataset.id); }
    else if(a==="cls-kid"){ classToggleKid(el.dataset.kid); }
    else if(a==="cls-shuttle"){ classSetShuttle(el.dataset.v==="1"); }
    else if(a==="cls-save"){ saveClass(); }
    else if(a==="cls-delete"){ deleteClass(el.dataset.id); }
    else if(a==="cls-cancel"){ classEdit=null; render(); }
    else if(a==="cls-overlay"){ if(e.target===el){ classEdit=null; render(); } }
  });
  root.addEventListener("input", function(e){
    var t2=e.target; if(!t2.matches) return;
    if(t2.matches("[data-kidname]")){ var id=t2.dataset.kid; for(var i=0;i<data.kids.length;i++) if(data.kids[i].id===id) data.kids[i].name=t2.value; persist(); }
    else if(t2.matches("[data-routinename]")){ updateRoutineName(t2.dataset.kid,t2.dataset.rid,t2.value); }
    else if(t2.id==="term-year"){ var v=parseInt(t2.value,10); if(!isNaN(v)) data.term.year=v; persist(); }
    else if(t2.id==="act-start"){ if(actEdit){ actEdit.start=t2.value; var ee=byId("act-end"); if(ee){ if(!ee.value || ee.value<=t2.value){ ee.value=addHour(t2.value); } actEdit.end=ee.value; } } }
    else if(t2.id==="act-end"){ if(actEdit) actEdit.end=t2.value; }
  });
  root.addEventListener("keydown", function(e){
    var t2=e.target;
    if(t2.id==="act-label"&&e.key==="Enter"){ e.preventDefault(); saveAct(); }
    else if(t2.matches&&t2.matches("[data-routineinput]")&&e.key==="Enter"){ e.preventDefault(); addRoutine(t2.dataset.kid,t2.value); }
    else if(t2.matches&&t2.matches("[data-oneoffinput]")&&e.key==="Enter"){ e.preventDefault(); addOneoff(t2.dataset.kid,t2.value); }
    else if(t2.matches&&t2.matches(".as-task")&&(e.key===" "||e.key==="Enter")){ e.preventDefault(); toggleItem(t2.dataset.kid,t2.dataset.task); }
    else if(t2.matches&&t2.matches(".as-avatar")&&(e.key===" "||e.key==="Enter")){ e.preventDefault(); pickPhoto(t2.dataset.kid); }
  });

  render();
})();
</script>
